<div class="container-fluid p-0">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-3 mb-3 w-100">

    <div class="d-flex align-items-center flex-grow-1 table-header-row">

      <div class="icon-badge flex-shrink-0">
        <i class="bi bi-layout-text-window-reverse"></i>
      </div>

      <div class="d-flex flex-column table-title-col">
        <h5 class="m-0 fw-bold text-truncate erp-title-section">
            {{ titulo }}
        </h5>

        @if (subtitulo) {
            <span class="text-muted-erp text-xs-erp text-truncate">
                {{ subtitulo }}
            </span>
        }
      </div>
    </div>

    <div class="d-flex align-items-center gap-2">

      @if (!hideSearch) {
          <div class="input-group search-sniper-group shadow-sm flex-grow-1 flex-md-grow-0">
            <span class="input-group-text border-end-0 ps-3">
              <i class="bi bi-search text-xs-erp"></i>
            </span>
            <input [formControl]="searchControl" class="form-control border-start-0 border-end-0 ps-0 shadow-none"
                   [placeholder]="searchPlaceholder" oninput="this.value = this.value.toUpperCase()">
            @if (searchControl.value) {
                <span class="input-group-text border-start-0 pe-2 cursor-pointer-erp" (click)="clearSearch()">
                    <i class="bi bi-x-circle-fill"></i>
                </span>
            }
          </div>
      }

      @if (showAddBtn) {
        <button class="btn btn-primary shadow-sm text-nowrap flex-shrink-0" (click)="onAddClick($event)">
          <i class="bi bi-plus-lg me-1"></i> <span>{{ btnText }}</span>
        </button>
      }
    </div>
  </div>


  <div class="table-container animate__animated animate__fadeInUp overflow-hidden">

    @if (loading) {
      <div class="progress table-loading-bar">
        <div class="progress-bar progress-bar-striped progress-bar-animated w-100"></div>
      </div>
    }

    <div class="table-responsive custom-scroll">
      <table class="table table-hover align-middle mb-0" [class.opacity-50]="loading">
        <ng-content select="[thead]"></ng-content>
        <ng-content select="[tbody]"></ng-content>
      </table>
    </div>

    @if (meta.total > 0) {
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center p-2 gap-3 mt-2 table-pagination-footer">

        <span class="table-pagination-text text-xs-erp fw-medium text-center text-md-start">
          Mostrando <span class="fw-bold">{{ data.length }}</span> de <span class="fw-bold">{{ meta.total }}</span> registros
        </span>

        <ngb-pagination
          [collectionSize]="meta.total"
          [page]="meta.page"
          [pageSize]="meta.limit"
          (pageChange)="pageChange.emit($event)"
          [maxSize]="3"
          [rotate]="true"
          [ellipses]="false"
          class="mb-0 shadow-sm">
        </ngb-pagination>
      </div>
    }
  </div>
</div>

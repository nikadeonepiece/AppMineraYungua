<div class="container-fluid p-3 p-md-4 mx-auto" style="max-width: var(--erp-max-width);">

    @if (loading()) {
        <div class="card-pro p-3 p-md-4 text-center py-5 text-muted-erp">
            <span class="spinner-border spinner-border-sm me-2"></span> Cargando...
        </div>
    } @else if (porCaserio().length === 0) {
        <div class="card-pro p-3 p-md-4 text-center py-5 text-muted-erp">Sin datos de caseríos.</div>
    } @else {
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="card-pro p-3 p-md-4">
                    <div class="text-center mb-1">
                        <div class="fw-bold text-erp">Distribución de comuneros por caserío</div>
                        <div class="text-muted-erp text-xs-erp">% del total inscrito</div>
                    </div>
                    <div style="height: 420px;">
                        <canvas baseChart
                            [type]="chartTypeDona"
                            [data]="chartDataDona()"
                            [options]="chartOptionsDona()"
                            [plugins]="[centerTextPlugin()]">
                        </canvas>
                    </div>
                </div>
            </div>
        </div>
    }
</div>
